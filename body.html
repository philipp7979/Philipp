<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>
<style>
:root {
  color-scheme: dark;
  --bg:#0B0D1A; --bg-elevated:#13162A;
  --surface:rgba(255,255,255,0.042); --surface-2:rgba(255,255,255,0.07);
  --fg:#F1F2FA; --muted:rgba(241,242,250,0.48); --muted-strong:rgba(241,242,250,0.72);
  --border:rgba(255,255,255,0.075); --border-strong:rgba(255,255,255,0.15);
  --brand:#4FC3F7; --brand-2:#81D4FA; --brand-ink:#003348;
  --brand-soft:rgba(79,195,247,0.13); --brand-line:rgba(79,195,247,0.30); --brand-glow:rgba(79,195,247,0.45);
  --pos:#22C55E; --pos-soft:rgba(34,197,94,0.14); --pos-line:rgba(34,197,94,0.32);
  --neg:#FB7185; --neg-soft:rgba(251,113,133,0.12); --neg-line:rgba(251,113,133,0.26);
  --warn:#FBBF24; --warn-soft:rgba(251,191,36,0.10);
  --track:rgba(255,255,255,0.06);
  --card-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 24px 56px -32px rgba(0,0,0,0.95);
  --glow-1:rgba(79,195,247,0.18); --glow-2:rgba(34,197,94,0.06);
  --grain-opacity:0.04; --overlay:rgba(6,6,14,0.70);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
  --radius-sm:8px;--radius-md:11px;--radius-lg:18px;--radius-pill:999px;
  --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;--text-xl:1.375rem;--text-2xl:1.75rem;--text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1);--ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms;--duration:200ms;
  --font-display:'Space Grotesk';--font-ui:'Hanken Grotesk';--font-mono:'JetBrains Mono';
}
[data-theme="aurora"]{
  color-scheme:dark;
  --bg:#070A18;--bg-elevated:#0F1225;
  --surface:rgba(120,148,255,0.05);--surface-2:rgba(120,148,255,0.09);
  --fg:#EEF0FF;--muted:rgba(220,228,255,0.52);--muted-strong:rgba(220,228,255,0.78);
  --border:rgba(120,148,255,0.12);--border-strong:rgba(120,148,255,0.24);
  --brand:#22D3EE;--brand-2:#67E8F9;--brand-ink:#003848;
  --brand-soft:rgba(34,211,238,0.14);--brand-line:rgba(34,211,238,0.32);--brand-glow:rgba(34,211,238,0.55);
  --pos:#34D399;--pos-soft:rgba(52,211,153,0.14);--neg:#FF6FA5;--neg-soft:rgba(255,111,165,0.13);
  --warn:#FFC65C;--warn-soft:rgba(255,198,92,0.11);
  --card-shadow:0 1px 0 rgba(140,160,255,0.07) inset,0 24px 56px -28px rgba(30,50,180,0.60);
  --glow-1:rgba(34,211,238,0.20);--glow-2:rgba(52,211,153,0.08);
}
[data-theme="daylight"]{
  color-scheme:light;
  --bg:#F3F2FA;--bg-elevated:#FFFFFF;
  --surface:#FFFFFF;--surface-2:#FAF9FF;
  --fg:#171622;--muted:rgba(23,22,34,0.52);--muted-strong:rgba(23,22,34,0.72);
  --border:rgba(23,22,60,0.10);--border-strong:rgba(23,22,60,0.18);
  --brand:#0284C7;--brand-2:#0EA5E9;--brand-ink:#FFFFFF;
  --brand-soft:rgba(2,132,199,0.08);--brand-line:rgba(2,132,199,0.24);--brand-glow:rgba(2,132,199,0.28);
  --pos:#0E9E64;--pos-soft:rgba(14,158,100,0.10);--neg:#E11D63;--neg-soft:rgba(225,29,99,0.08);
  --warn:#B4690E;--warn-soft:rgba(180,105,14,0.10);
  --card-shadow:0 1px 2px rgba(23,22,60,0.05),0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1:rgba(2,132,199,0.07);--glow-2:rgba(14,158,100,0.04);
}

*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--text-base);-webkit-font-smoothing:antialiased;transition:background var(--duration) var(--ease)}
.grain-overlay{position:relative}
.grain-overlay::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:var(--grain-opacity);mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");background-size:200px 200px}
.page{position:relative;min-height:100dvh;background:var(--bg);color:var(--fg);padding:var(--space-8) var(--space-5) var(--space-16);isolation:isolate}
.page::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(58% 42% at 82% 6%,var(--glow-1),transparent 70%),radial-gradient(48% 38% at 12% 92%,var(--glow-2),transparent 72%)}
.shell{max-width:760px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-8);flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:var(--space-4)}
.back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:6px 12px 6px 8px;background:color-mix(in srgb,var(--brand) 8%,transparent);border:1px solid color-mix(in srgb,var(--brand) 20%,transparent);border-radius:var(--radius-pill);color:var(--brand);font-size:var(--text-xs);font-weight:500;text-decoration:none;transition:background var(--duration) var(--ease),border-color var(--duration) var(--ease)}
.back:hover{background:color-mix(in srgb,var(--brand) 14%,transparent);border-color:color-mix(in srgb,var(--brand) 32%,transparent)}
.backArrow{font-size:14px;line-height:1}
.header-title{display:flex;align-items:center;gap:var(--space-3)}
.header-title h1{margin:0;font-family:var(--font-display);font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:600;border:1px solid transparent}
.chip-live{background:var(--pos-soft);color:var(--pos);border-color:var(--pos-line)}
.chip-loading{background:var(--brand-soft);color:var(--brand);border-color:var(--brand-line)}
.chip-err{background:var(--neg-soft);color:var(--neg);border-color:var(--neg-line)}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 var(--space-5);height:38px;border-radius:var(--radius-pill);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:600;border:none;cursor:pointer;transition:all var(--duration) var(--ease);text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--brand);color:var(--brand-ink)}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--muted-strong);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2);color:var(--fg);border-color:var(--border-strong)}
.btn-danger{background:var(--neg-soft);color:var(--neg);border:1px solid var(--neg-line)}
.btn-danger:hover{background:rgba(251,113,133,0.2);filter:brightness(1.1)}
.btn-sm{height:32px;padding:0 var(--space-4);font-size:var(--text-xs)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* Theme switcher */
.themeSeg{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px}
.themeBtn{border:none;background:transparent;color:var(--muted);padding:4px 10px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:600;cursor:pointer;transition:all var(--duration);display:flex;align-items:center;gap:6px}
.themeBtn:hover{color:var(--fg)}
.themeBtnActive{background:var(--surface-2);color:var(--fg)}
.themeSwatch{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-6);box-shadow:var(--card-shadow);transition:background var(--duration),border-color var(--duration)}
.card+.card{margin-top:var(--space-4)}
.cardLabel{font-size:var(--text-xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:var(--space-4)}

/* Connect card */
.connectCard{text-align:center;padding:var(--space-16) var(--space-8)}
.connectIcon{width:64px;height:64px;margin:0 auto var(--space-6);background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center}
.connectIcon svg{width:32px;height:32px;stroke:var(--brand);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.connectCard h2{margin:0 0 var(--space-3);font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700}
.connectCard p{margin:0 0 var(--space-8);color:var(--muted);max-width:30rem;margin-left:auto;margin-right:auto;line-height:1.6}
.connectNote{font-size:var(--text-xs);color:var(--muted);margin-top:var(--space-4)}
.connectNote a{color:var(--brand);text-decoration:none}
.connectNote a:hover{text-decoration:underline}

/* Stat grid */
.statGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4);margin-bottom:var(--space-4)}
@media(min-width:600px){.statGrid{grid-template-columns:repeat(4,1fr)}}
.statCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);box-shadow:var(--card-shadow)}
.statLabel{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:var(--space-2)}
.statVal{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;line-height:1;margin-bottom:var(--space-2)}
.statSub{font-size:var(--text-xs);color:var(--muted)}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:var(--text-xs);font-weight:700;padding:2px 7px;border-radius:var(--radius-pill)}
.delta-pos{background:var(--pos-soft);color:var(--pos)}
.delta-neg{background:var(--neg-soft);color:var(--neg)}
.delta-neu{background:var(--surface-2);color:var(--muted)}
.bmiPill{display:inline-block;font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-pill);margin-top:var(--space-1)}

/* Chart */
.chartWrap{min-height:72px;position:relative}
.chartWrap svg{display:block;width:100%;overflow:visible}
.chartLabels{display:flex;justify-content:space-between;margin-top:4px}
.chartLabels span{font-size:var(--text-xs);color:var(--muted);font-family:var(--font-mono)}
.chartEmpty{color:var(--muted);font-size:var(--text-sm);text-align:center;padding:var(--space-6) 0}

/* Composition bar */
.compBar{height:12px;border-radius:var(--radius-pill);overflow:hidden;display:flex;margin-bottom:var(--space-5);background:var(--track)}
.compSeg{height:100%;transition:width .5s var(--ease-premium)}
.compGrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3) var(--space-6)}
@media(min-width:480px){.compGrid{grid-template-columns:repeat(4,1fr)}}
.compItem{display:flex;flex-direction:column;gap:2px}
.compDot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px}
.compItemLabel{font-size:var(--text-xs);color:var(--muted);display:flex;align-items:center}
.compItemVal{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600}

/* Settings / sync footer */
.syncRow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3)}
.syncInfo{font-size:var(--text-sm);color:var(--muted)}
.syncActions{display:flex;gap:var(--space-2);align-items:center}
.heightRow{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);flex-wrap:wrap}
.heightRow label{font-size:var(--text-sm);color:var(--muted-strong);white-space:nowrap}
.heightInput{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--fg);font-family:var(--font-mono);font-size:var(--text-sm);padding:6px 10px;width:88px;outline:none;transition:border-color var(--duration)}
.heightInput:focus{border-color:var(--brand-line)}
.unitToggle{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:2px}
.unitBtn{border:none;background:transparent;color:var(--muted);padding:3px 9px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:600;cursor:pointer;transition:all var(--duration)}
.unitBtnActive{background:var(--surface-2);color:var(--fg)}
</style>
</head>
<body class="grain-overlay">
<div class="page">
<div class="shell">

<div class="header">
  <div class="header-left">
    <a href="index.html" class="back"><span class="backArrow">←</span> Back</a>
    <div class="header-title">
      <h1>Body</h1>
    </div>
  </div>
  <div class="header-right" id="headerRight"></div>
</div>

<div id="root"></div>

</div><!-- .shell -->

<script>
// ── Constants ─────────────────────────────────────────────────
const BODY_KEY   = 'patron_body_v1';
const HEIGHT_KEY = 'patron_height_cm';
const UNIT_KEY   = 'patron_weight_unit';
const ON_SERVER  = location.protocol === 'http:' || location.protocol === 'https:';

const THEMES = [
  { key:'nocturne', label:'Nocturne', swatch:'#4F6EF7' },
  { key:'aurora',   label:'Aurora',   swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key:'daylight', label:'Daylight', swatch:'#6A45FF' },
];

let currentTheme = (function(){ try{ return localStorage.getItem('patron_theme')||'nocturne'; }catch(e){ return 'nocturne'; } })();
if (!THEMES.some(t => t.key === currentTheme)) currentTheme = 'nocturne';

function applyTheme(name) {
  if (!THEMES.some(t => t.key === name)) name = 'nocturne';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  try{ localStorage.setItem('patron_theme', name); }catch(e){}
  renderHeader();
}

// ── State ─────────────────────────────────────────────────────
let data     = null;  // latest Withings payload or null
let syncing  = false;
let unit     = 'kg';  // 'kg' | 'lbs'
let heightCm = 0;

function loadState() {
  try { unit     = localStorage.getItem(UNIT_KEY)  || 'kg'; }    catch(e){}
  try { heightCm = parseInt(localStorage.getItem(HEIGHT_KEY) || '0') || 0; } catch(e){}
  try {
    const s = localStorage.getItem(BODY_KEY);
    if (s) data = JSON.parse(s);
  } catch(e) {}
}

// ── Unit helpers ───────────────────────────────────────────────
function toDisplay(kg) {
  if (kg == null) return null;
  return unit === 'lbs' ? Math.round(kg * 2.20462 * 10) / 10 : Math.round(kg * 10) / 10;
}
function unitLabel() { return unit; }
function calcBmi(kg) {
  if (!kg || !heightCm) return null;
  return Math.round((kg / Math.pow(heightCm / 100, 2)) * 10) / 10;
}
function bmiCategory(bmi) {
  if (bmi == null) return null;
  if (bmi < 18.5) return { label:'Underweight', color:'var(--warn)' };
  if (bmi < 25)   return { label:'Normal',       color:'var(--pos)' };
  if (bmi < 30)   return { label:'Overweight',   color:'var(--warn)' };
  return                  { label:'Obese',        color:'var(--neg)' };
}

// ── Weight chart ───────────────────────────────────────────────
function buildChartPoints(raw) {
  if (!raw || !raw.length) return [];
  // Aggregate to one point per day (last measurement of each day)
  const byDay = {};
  for (const p of raw) {
    const day = new Date(p.date).toISOString().slice(0, 10);
    if (!byDay[day] || p.date > byDay[day].date) byDay[day] = p;
  }
  return Object.keys(byDay).sort().map(d => byDay[d]);
}

function sparklineSvg(points) {
  if (!points || points.length < 2) return '<div class="chartEmpty">No weight data for this period.</div>';
  const vals = points.map(p => p.value);
  const min  = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 0.5;
  const W = 600, H = 80, px = 8, py = 10;
  const cx = (i) => px + (i / (points.length - 1)) * (W - 2 * px);
  const cy = (v) => H - py - ((v - min) / range) * (H - 2 * py);
  const polyPts = points.map((p, i) => cx(i).toFixed(1) + ',' + cy(p.value).toFixed(1)).join(' ');
  const areaPts = 'M' + points.map((p, i) => cx(i).toFixed(1) + ',' + cy(p.value).toFixed(1)).join(' L') +
    ' L' + cx(points.length - 1).toFixed(1) + ',' + (H - py + 2) +
    ' L' + cx(0).toFixed(1) + ',' + (H - py + 2) + ' Z';
  const lastX = cx(points.length - 1).toFixed(1);
  const lastY = cy(points[points.length - 1].value).toFixed(1);
  const firstDate = new Date(points[0].date).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  const lastDate  = new Date(points[points.length - 1].date).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  const minLbl    = toDisplay(min) + ' ' + unitLabel();
  const maxLbl    = toDisplay(max) + ' ' + unitLabel();
  return `
    <div class="chartWrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--brand)" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="var(--brand)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPts}" fill="url(#wGrad)" stroke="none"/>
        <polyline points="${polyPts}" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${lastX}" cy="${lastY}" r="4" fill="var(--brand)" stroke="var(--bg)" stroke-width="2.5"/>
      </svg>
    </div>
    <div class="chartLabels">
      <span>${firstDate}</span>
      <span>${minLbl} – ${maxLbl}</span>
      <span>${lastDate}</span>
    </div>`;
}

// ── Delta chip ─────────────────────────────────────────────────
function deltaChip(current, prev, lowerIsBetter) {
  if (current == null || prev == null) return '';
  const diff = Math.round((current - prev) * 10) / 10;
  if (diff === 0) return '<span class="delta delta-neu">±0</span>';
  const positive = diff > 0;
  const good = lowerIsBetter ? !positive : positive;
  const cls  = good ? 'delta-pos' : 'delta-neg';
  const sign = positive ? '+' : '';
  return `<span class="delta ${cls}">${sign}${diff}</span>`;
}

// ── Composition bar ────────────────────────────────────────────
function compBarHtml(d) {
  const w  = d.weight;
  const fm = d.fatMass;
  const ms = d.muscle;
  const bo = d.bone;
  if (!w || !fm) return '';
  const lean      = w - fm;
  const fatPct    = Math.round((fm / w) * 1000) / 10;
  const musclePct = d.muscle ? Math.round((d.muscle / w) * 1000) / 10 : 0;
  const bonePct   = d.bone   ? Math.round((d.bone   / w) * 1000) / 10 : 0;
  const hydrPct   = d.hydration ? Math.round((d.hydration / w) * 1000) / 10 : 0;
  const otherPct  = Math.max(0, 100 - fatPct - musclePct - bonePct - hydrPct);

  const segs = [
    { pct: fatPct,    color:'#FB923C', label:'Fat',      val: toDisplay(fm) + ' ' + unitLabel() },
    { pct: musclePct, color:'var(--brand)', label:'Muscle', val: d.muscle ? toDisplay(d.muscle) + ' ' + unitLabel() : '—' },
    { pct: bonePct,   color:'#A78BFA', label:'Bone',     val: d.bone ? toDisplay(d.bone) + ' ' + unitLabel() : '—' },
    { pct: hydrPct,   color:'#34D399', label:'Hydration',val: d.hydration ? toDisplay(d.hydration) + ' ' + unitLabel() : '—' },
    { pct: otherPct,  color:'var(--track)', label:'Other', val:'—' },
  ].filter(s => s.pct > 0.5);

  const bar  = segs.map(s => `<div class="compSeg" style="width:${s.pct}%;background:${s.color}"></div>`).join('');
  const grid = segs.slice(0, 4).map(s =>
    `<div class="compItem"><div class="compItemLabel"><span class="compDot" style="background:${s.color}"></span>${s.label}</div><div class="compItemVal">${s.val}</div></div>`
  ).join('');

  return `<div class="compBar">${bar}</div><div class="compGrid">${grid}</div>`;
}

// ── Relative time ──────────────────────────────────────────────
function relTime(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s / 60) + ' min ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// ── Render ─────────────────────────────────────────────────────
function renderHeader() {
  const el = document.getElementById('headerRight');
  if (!el) return;
  let html = '';
  if (syncing) html += '<span class="chip chip-loading"><span class="pulse"></span>Syncing</span>';
  else if (data) html += '<span class="chip chip-live"><span class="pulse"></span>Withings live</span>';
  html += `
    <div class="themeSeg" role="radiogroup" aria-label="Theme">
      ${THEMES.map(t => `<button type="button" class="themeBtn${t.key===currentTheme?' themeBtnActive':''}" onclick="applyTheme('${t.key}')">
        <span class="themeSwatch" style="background:${t.swatch}"></span>${t.label}
      </button>`).join('')}
    </div>`;
  el.innerHTML = html;
}

function renderRoot() {
  const el = document.getElementById('root');
  if (!el) return;

  if (!data) {
    // Connect UI
    el.innerHTML = `
      <div class="connectCard card">
        <div class="connectIcon">
          <svg viewBox="0 0 32 32">
            <rect x="6" y="12" width="20" height="13" rx="3"/>
            <path d="M10 12V9a6 6 0 0112 0v3"/>
            <circle cx="16" cy="19" r="2.5" fill="var(--brand)" stroke="none"/>
          </svg>
        </div>
        <h2>Connect Withings</h2>
        <p>Sync your weight, body fat %, muscle mass, bone mass and hydration automatically — every time you step on your scale.</p>
        ${ON_SERVER
          ? `<a href="/api/withings/login" class="btn btn-primary">Connect Withings</a>`
          : `<div class="btn btn-primary" style="opacity:.5;cursor:not-allowed">Connect Withings</div><p style="font-size:var(--text-xs);color:var(--muted);margin-top:var(--space-2)">OAuth works on the deployed app only.</p>`}
        <p class="connectNote">Needs <code>WITHINGS_CLIENT_ID</code> + <code>WITHINGS_CLIENT_SECRET</code> in Vercel env vars.
          Register the redirect URI <code>https://row-gray.vercel.app/api/withings/callback</code> in your
          <a href="https://account.withings.com/partner/add_oauth2" target="_blank">Withings developer app</a>. Use scope <code>user.metrics</code>.</p>
      </div>`;
    return;
  }

  const w    = data.weight;
  const fat  = data.fatPct;
  const fm   = data.fatMass;
  const lean = (w && fm) ? Math.round((w - fm) * 10) / 10 : null;
  const bmi  = calcBmi(w);
  const bcat = bmiCategory(bmi);
  const prev = data.weightWeekAgo;
  const chartPts = buildChartPoints(data.weightChart || []);

  const statCards = [
    {
      label: 'Weight',
      val:   w   != null ? toDisplay(w)   + ' ' + unitLabel() : '—',
      sub:   prev != null ? deltaChip(w, prev, true) + ' vs 7 days' : 'No prior data',
      accent: 'var(--brand)',
    },
    {
      label: 'Body Fat',
      val:   fat != null ? fat + '%' : '—',
      sub:   fm  != null ? toDisplay(fm) + ' ' + unitLabel() + ' fat mass' : '',
      accent: '#FB923C',
    },
    {
      label: 'Lean Mass',
      val:   lean != null ? toDisplay(lean) + ' ' + unitLabel() : '—',
      sub:   [data.muscle ? 'Muscle: ' + toDisplay(data.muscle) + unitLabel() : '', data.bone ? 'Bone: ' + toDisplay(data.bone) + unitLabel() : ''].filter(Boolean).join(' · ') || '',
      accent: 'var(--pos)',
    },
    {
      label: 'BMI',
      val:   bmi  != null ? String(bmi) : (heightCm ? '—' : 'Set height ↓'),
      sub:   bcat ? `<span class="bmiPill" style="background:${bcat.color}22;color:${bcat.color}">${bcat.label}</span>` : (heightCm ? '' : ''),
      accent: bcat ? bcat.color : 'var(--muted)',
    },
  ];

  const grid = statCards.map(c => `
    <div class="statCard">
      <div class="statLabel" style="color:${c.accent}">${c.label}</div>
      <div class="statVal">${c.val}</div>
      <div class="statSub">${c.sub}</div>
    </div>`).join('');

  const compSection = compBarHtml(data) ? `
    <div class="card">
      <div class="cardLabel">Composition breakdown</div>
      ${compBarHtml(data)}
    </div>` : '';

  el.innerHTML = `
    <div class="statGrid">${grid}</div>

    <div class="card">
      <div class="cardLabel">30-day weight</div>
      ${sparklineSvg(chartPts)}
    </div>

    ${compSection}

    <div class="card">
      <div class="cardLabel">Settings</div>
      <div class="heightRow">
        <label for="heightInput">Height</label>
        <input id="heightInput" class="heightInput" type="number" min="100" max="250" placeholder="cm"
          value="${heightCm || ''}"
          oninput="onHeightChange(this.value)" />
        <span style="font-size:var(--text-xs);color:var(--muted)">cm — used for BMI</span>
        <div class="unitToggle">
          <button class="unitBtn${unit==='kg'?' unitBtnActive':''}" onclick="setUnit('kg')">kg</button>
          <button class="unitBtn${unit==='lbs'?' unitBtnActive':''}" onclick="setUnit('lbs')">lbs</button>
        </div>
      </div>
      <div class="syncRow">
        <span class="syncInfo">Synced ${relTime(data.ts)}</span>
        <div class="syncActions">
          <button class="btn btn-ghost btn-sm" onclick="syncData()" ${syncing ? 'disabled' : ''}>↺ Refresh</button>
          <button class="btn btn-danger btn-sm" onclick="disconnect()">Disconnect</button>
        </div>
      </div>
    </div>`;
}

function render() {
  renderHeader();
  renderRoot();
}

// ── Actions ────────────────────────────────────────────────────
function onHeightChange(v) {
  heightCm = parseInt(v) || 0;
  try { localStorage.setItem(HEIGHT_KEY, String(heightCm)); } catch(e){}
  render();
}

function setUnit(u) {
  unit = u;
  try { localStorage.setItem(UNIT_KEY, u); } catch(e){}
  render();
}

async function syncData() {
  if (!ON_SERVER) return;
  syncing = true; render();
  try {
    const r = await fetch('/api/withings/data', { cache: 'no-store' });
    const j = await r.json();
    if (j.connected) {
      data = j;
      try { localStorage.setItem(BODY_KEY, JSON.stringify(j)); } catch(e){}
      // Keep suite profile weight in sync with the scale
      if (j.weight) {
        try {
          const prof = JSON.parse(localStorage.getItem('patron_profile_v1') || 'null') || {};
          prof.weightKg = j.weight;
          localStorage.setItem('patron_profile_v1', JSON.stringify(prof));
        } catch(e) {}
      }
    } else {
      data = null;
      try { localStorage.removeItem(BODY_KEY); } catch(e){}
    }
  } catch(e) { /* keep cached */ }
  syncing = false; render();
}

async function disconnect() {
  try { await fetch('/api/withings/logout'); } catch(e){}
  data = null;
  try { localStorage.removeItem(BODY_KEY); } catch(e){}
  render();
}

// ── Init ───────────────────────────────────────────────────────
loadState();
render();

// Handle OAuth return (?withings=connected|error|denied)
const q = new URLSearchParams(location.search);
const wr = q.get('withings');
if (wr) {
  history.replaceState(null, '', location.pathname);
  if (wr === 'connected') syncData();
}
// Auto-sync on load if deployed and data might be stale (>1 h)
else if (ON_SERVER) {
  const stale = !data || (Date.now() - (data.ts || 0)) > 3600000;
  if (stale) syncData();
}
</script>
</body>
</html>
