<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>
<style>
:root{
  color-scheme: dark;
  /* Dashboard token system — nocturne (default) */
  --bg: #0B0D1A; --bg-elevated: #13162A;
  --surface: rgba(255,255,255,0.042); --surface-2: rgba(255,255,255,0.07);
  --fg: #F1F2FA; --muted: rgba(241,242,250,0.48); --muted-strong: rgba(241,242,250,0.72);
  --border: rgba(255,255,255,0.075); --border-strong: rgba(255,255,255,0.15);
  --brand: #4F6EF7; --brand-2: #7B9CFF; --brand-ink: #F0F4FF;
  --brand-soft: rgba(79,110,247,0.14); --brand-line: rgba(79,110,247,0.32); --brand-glow: rgba(79,110,247,0.50);
  --pos: #22C55E; --pos-soft: rgba(34,197,94,0.14); --pos-line: rgba(34,197,94,0.32);
  --neg: #FB7185; --neg-soft: rgba(251,113,133,0.12); --neg-line: rgba(251,113,133,0.26);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.10); --warn-line: rgba(251,191,36,0.26);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 24px 56px -32px rgba(0,0,0,0.95);
  --glow-1: rgba(79,110,247,0.20); --glow-2: rgba(34,197,94,0.07);
  --grain-opacity: 0.04; --overlay: rgba(6,6,14,0.70);
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono';
  /* Peak-specific aliases — existing CSS uses these names unchanged */
  --bg2: var(--bg-elevated);
  --panel: rgba(13,16,38,0.72); --panel2: rgba(11,13,26,0.95);
  --muted2: var(--muted-strong);
  --line: var(--border); --line2: var(--brand-line);
  --accent: var(--brand); --accent2: var(--brand-2); --glow: var(--brand-glow);
  --low: var(--neg);
  --serif: var(--font-display); --ui: var(--font-ui); --mono: var(--font-mono);
  --radius: 18px; --radius-sm: 12px; --pill: 999px;
  --ease: cubic-bezier(.16,1,.3,1);
  --ringc: var(--brand);
}
[data-theme="aurora"]{
  color-scheme: dark;
  --bg: #070A18; --bg-elevated: #0F1225;
  --surface: rgba(120,148,255,0.05); --surface-2: rgba(120,148,255,0.09);
  --fg: #EEF0FF; --muted: rgba(220,228,255,0.52); --muted-strong: rgba(220,228,255,0.78);
  --border: rgba(120,148,255,0.12); --border-strong: rgba(120,148,255,0.24);
  --brand: #5B78FF; --brand-2: #92AEFF; --brand-ink: #F0F4FF;
  --brand-soft: rgba(91,120,255,0.16); --brand-line: rgba(91,120,255,0.34); --brand-glow: rgba(91,120,255,0.60);
  --pos: #34D399; --pos-soft: rgba(52,211,153,0.14); --pos-line: rgba(52,211,153,0.30);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(120,148,255,0.09);
  --card-shadow: 0 1px 0 rgba(140,160,255,0.07) inset, 0 24px 56px -28px rgba(30,50,180,0.60);
  --glow-1: rgba(91,120,255,0.24); --glow-2: rgba(52,211,153,0.10);
  --grain-opacity: 0.04;
  --panel: rgba(9,12,32,0.72); --panel2: rgba(7,10,24,0.95);
  --line: var(--border); --line2: var(--brand-line);
  --accent: var(--brand); --accent2: var(--brand-2); --glow: var(--brand-glow);
  --bg2: var(--bg-elevated); --muted2: var(--muted-strong); --low: var(--neg);
}
[data-theme="daylight"]{
  color-scheme: light;
  --bg: #F3F2FA; --bg-elevated: #FFFFFF;
  --surface: #FFFFFF; --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02;
  --panel: rgba(255,255,255,0.88); --panel2: rgba(250,249,255,0.97);
  --line: var(--border); --line2: var(--brand-line);
  --accent: var(--brand); --accent2: var(--brand-2); --glow: var(--brand-glow);
  --bg2: var(--bg-elevated); --muted2: var(--muted-strong); --low: var(--neg);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{ background:var(--bg); color:var(--fg); font-family:var(--ui); -webkit-font-smoothing:antialiased; }
.page{ position:relative; min-height:100dvh; padding:clamp(20px,4vw,42px) clamp(16px,3vw,24px) 90px; isolation:isolate; overflow:hidden; }
.page::before{ content:''; position:absolute; inset:0; pointer-events:none; z-index:-1; background: radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%), radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%); }
/* film grain */
.grain{ position:fixed; inset:0; pointer-events:none; z-index:1; opacity:var(--grain-opacity); mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); background-size:200px 200px; }
/* drifting particles */
.dust{ display:none; }
.dust i{ display:none; }
@keyframes spark{ 0%,100%{ transform:translateY(0) scale(.6); opacity:.05 } 50%{ transform:translateY(-16px) scale(1.4); opacity:.55 } }
.shell{ max-width:960px; margin:0 auto; position:relative; z-index:1; }

/* header */
.top{ display:flex; align-items:center; gap:16px; margin-bottom:var(--space-8,2rem); flex-wrap:wrap; justify-content:space-between; }
.gem{ flex-shrink:0; margin:-10px 0 -10px -6px; animation:gemFloat 9s ease-in-out infinite alternate; }
@keyframes gemFloat{ from{ transform:translateY(0) rotate(-2deg) } to{ transform:translateY(-4px) rotate(2deg) } }
@keyframes gemGlow{ 0%,100%{ filter:drop-shadow(0 0 18px rgba(110,231,183,.45)) } 50%{ filter:drop-shadow(0 0 30px rgba(110,231,183,.7)) } }
.hgroup{ flex:1; min-width:240px; }
.htitle{ font-family:var(--font-display,'Space Grotesk',sans-serif); font-style:normal; font-weight:600; font-size:clamp(26px,3.5vw,40px); line-height:1.05; letter-spacing:-.025em; margin:0; }
.htitle em{ font-style:normal; color:var(--brand); }
.maskLine{ display:inline-block; overflow:hidden; padding-bottom:.14em; transform-style:preserve-3d; }
.lineInner{ display:inline-block; transform-origin:top center; }
.lineInner.reveal{ transform:translateY(110%) rotateX(-75deg); opacity:0; animation:lineReveal 1.1s cubic-bezier(.16,1,.3,1) .15s forwards; }
@keyframes lineReveal{ to{ transform:none; opacity:1 } }
@media (prefers-reduced-motion:reduce){ .lineInner.reveal{ animation:none; transform:none; opacity:1 } }
.hdate{ font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:5px 0 0; }
.backLink{ display:inline-flex; align-items:center; gap:6px; align-self:flex-start; padding:6px 13px 6px 9px; background:var(--brand-soft); border:1px solid var(--brand-line); border-radius:var(--pill); color:var(--brand); font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:0.01em; text-decoration:none; transition:background 200ms, border-color 200ms; white-space:nowrap; }
.backLink:hover{ background:color-mix(in srgb, var(--brand) 22%, transparent); border-color:var(--brand); }

/* source switch */
.srcRow{ display:flex; gap:8px; margin:0 0 18px; flex-wrap:wrap; align-items:center; }
.srcLab{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-right:6px; }
.srcPill{ appearance:none; cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted2); background:var(--panel); border:1px solid var(--line); border-radius:var(--pill); padding:9px 16px; display:inline-flex; align-items:center; gap:7px; transition:all .2s var(--ease); }
.srcPill:hover{ border-color:var(--line2); color:var(--fg); }
.srcPill.on{ color:#04130c; background:linear-gradient(120deg,var(--accent),var(--accent2)); border-color:transparent; box-shadow:0 0 22px -6px var(--glow); font-weight:600; }
.srcDot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ticker */
.ticker{ display:flex; align-items:stretch; gap:0; border:1px solid var(--line); border-radius:var(--pill); background:var(--panel); overflow:hidden; margin-bottom:46px; }
.tkLive{ display:flex; align-items:center; gap:8px; padding:13px 18px; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); border-right:1px solid var(--line); flex-shrink:0; }
.tkLive .d{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:blink 2s ease-in-out infinite; }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.35} }
.tkScroll{ display:flex; align-items:center; gap:0; overflow:hidden; flex:1; }
.tkItem{ display:flex; align-items:center; gap:9px; padding:13px 22px; font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); white-space:nowrap; border-right:1px solid var(--line); }
.tkItem b{ color:var(--fg); font-weight:600; }
.tkItem .dot{ width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.7; }

/* section heading */
.sec{ display:flex; align-items:center; gap:14px; margin:0 0 18px; }
.secNum{ font-family:var(--serif); font-style:italic; font-size:14px; color:var(--muted); }
.secTitle{ font-family:var(--mono); font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted2); }
.secLine{ flex:1; height:1px; background:linear-gradient(90deg,var(--line2),transparent); }
.secI{ appearance:none; width:22px; height:22px; border-radius:50%; border:1px solid var(--line); display:grid; place-items:center; font-family:var(--serif); font-style:italic; font-size:12px; color:var(--muted); cursor:pointer; background:none; }
.secI:hover,.secI.on{ border-color:var(--accent); color:var(--accent2); }
.infoCard{ border:1px solid var(--line); border-radius:var(--radius); background:var(--panel); padding:22px 24px; margin:0 0 18px; }
.infoTag{ display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#04130c; background:linear-gradient(120deg,var(--accent),var(--accent2)); border-radius:var(--pill); padding:4px 10px; margin-bottom:14px; font-weight:600; }
.infoCard h4{ font-family:var(--serif); font-style:italic; font-size:17px; margin:14px 0 6px; font-weight:600; }
.infoCard h4:first-of-type{ margin-top:0; }
.infoCard p{ font-size:13.5px; line-height:1.6; color:var(--muted2); margin:0; }
.infoCard b{ color:var(--fg); }
.footNote{ text-align:center; font-family:var(--mono); font-size:10px; letter-spacing:.05em; color:var(--muted); margin:32px auto 0; max-width:64ch; line-height:1.7; opacity:.7; }

/* right now */
.nowGrid{ display:grid; grid-template-columns:300px 1fr; gap:18px; margin-bottom:54px; }
@media (max-width:760px){ .nowGrid{ grid-template-columns:1fr; } }
.card{ position:relative; border:1px solid var(--border); border-radius:var(--radius); background:rgba(13,16,38,0.72); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); padding:26px; transition:transform .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease); box-shadow:var(--card-shadow); }
.card:hover{ border-color:var(--brand-line); box-shadow:0 0 50px -18px var(--brand-glow), var(--card-shadow); }
/* compact tracker bits */
.trackRow{ display:flex; align-items:stretch; gap:8px; margin-top:4px; }
.trackRow .cafChips{ flex:1; }
.searchToggle{ appearance:none; cursor:pointer; flex-shrink:0; width:44px; border-radius:var(--radius-sm); border:1px solid var(--line2); background:rgba(52,211,153,.05); color:var(--accent2); display:grid; place-items:center; transition:all .15s var(--ease); }
.searchToggle:hover,.searchToggle.on{ background:rgba(52,211,153,.16); border-color:var(--accent); }
.searchToggle .cafSearchIcon{ position:static; transform:none; }
.trackLink{ display:inline-block; margin-top:14px; font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent2); text-decoration:none; }
.trackLink:hover{ color:var(--accent); }
.cafChip.suppOn{ background:linear-gradient(120deg,var(--accent),var(--accent2)); border-color:transparent; }
.cafChip.suppOn .cafChipName{ color:#04130c; }
.scoreCard{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; text-align:center; }
.bigRing{ position:relative; width:200px; height:200px; display:grid; place-items:center; }
.bigRing svg{ position:absolute; inset:0; transform:rotate(-90deg); overflow:visible; }
.bigRing .tr{ fill:none; stroke:rgba(255,255,255,.06); stroke-width:6; }
.bigRing .fl{ fill:none; stroke:var(--ringc,var(--accent)); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s var(--ease); filter:drop-shadow(0 0 6px var(--ringc,var(--accent))) drop-shadow(0 0 16px var(--ringc,var(--accent))); }
.bigRing .glow{ position:absolute; inset:18px; border-radius:50%; background:radial-gradient(closest-side, var(--ringc,var(--accent)), transparent 72%); opacity:.16; filter:blur(12px); animation:pulse 4s var(--ease) infinite; }
@keyframes pulse{ 0%,100%{opacity:.12} 50%{opacity:.26} }
.bigInner{ position:relative; z-index:1; }
.bigNum{ font-family:var(--serif); font-style:italic; font-weight:600; font-size:64px; line-height:1; color:var(--fg); }
.bigWord{ font-family:var(--serif); font-style:italic; font-size:18px; color:var(--accent2); margin-top:2px; }
.bigCap{ font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-top:8px; }
/* compact live "Peak now" score pinned at the top — current energy at the exact time, updates every minute */
.topScore{ display:flex; align-items:center; gap:18px; padding:14px 20px; margin-bottom:22px; }
.tsRing{ position:relative; width:72px; height:72px; display:grid; place-items:center; flex:none; }
.tsRing svg{ position:absolute; inset:0; transform:rotate(-90deg); overflow:visible; }
.tsRing .tr{ fill:none; stroke:rgba(255,255,255,.06); stroke-width:5; }
.tsRing .fl{ fill:none; stroke:var(--ringc,var(--accent)); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 1s var(--ease); filter:drop-shadow(0 0 5px var(--ringc,var(--accent))) drop-shadow(0 0 12px var(--ringc,var(--accent))); }
.tsRing .glow{ position:absolute; inset:9px; border-radius:50%; background:radial-gradient(closest-side, var(--ringc,var(--accent)), transparent 72%); opacity:.18; filter:blur(10px); }
.tsNum{ position:relative; z-index:1; font-family:var(--serif); font-style:italic; font-weight:600; font-size:30px; line-height:1; color:var(--fg); }
.tsMeta{ display:flex; flex-direction:column; gap:4px; }
.tsWord{ font-family:var(--serif); font-style:italic; font-size:20px; line-height:1; color:var(--accent2); }
.tsCap{ font-family:var(--mono); font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
.whyLink{ font-family:var(--serif); font-style:italic; font-size:14px; color:var(--muted2); cursor:pointer; border:0; background:none; }
.whyLink:hover{ color:var(--accent2); }
.whyBox{ display:none; margin-top:6px; width:100%; }
.whyBox.on{ display:block; }
.whyRow{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:7px 0; border-top:1px solid var(--line); }
.whyRow b{ color:var(--fg); }

.todayEyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin:0 0 14px; }
.todayHead{ font-family:var(--serif); font-style:italic; font-weight:500; font-size:clamp(22px,3vw,30px); line-height:1.2; margin:0 0 10px; }
.todaySub{ font-size:15px; color:var(--muted2); line-height:1.55; margin:0 0 20px; }
.recRow{ display:flex; gap:13px; align-items:flex-start; padding:13px 0; border-top:1px solid var(--line); }
.recRow:first-of-type{ border-top:0; }
.recDot{ width:7px; height:7px; border-radius:50%; background:var(--accent); margin-top:6px; flex-shrink:0; box-shadow:0 0 8px var(--accent); }
.recRow.warn .recDot{ background:var(--warn); box-shadow:0 0 8px var(--warn); }
.recTxt{ font-size:14.5px; line-height:1.5; color:var(--muted2); }
.recTxt b{ color:var(--fg); font-weight:600; }

/* energy curve */
.curveCard{ padding:26px 26px 18px; }
.curveTop{ display:flex; align-items:center; gap:20px; margin-bottom:22px; flex-wrap:wrap; }
.peakRing{ position:relative; width:84px; height:84px; flex-shrink:0; display:grid; place-items:center; }
.peakRing svg{ position:absolute; inset:0; transform:rotate(-90deg); overflow:visible; }
.peakRing .tr{ fill:none; stroke:rgba(255,255,255,.07); stroke-width:4; }
.peakRing .fl{ fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .4s var(--ease); filter:drop-shadow(0 0 5px var(--accent)); }
.peakNum{ font-family:var(--serif); font-style:italic; font-weight:600; font-size:30px; color:var(--fg); position:relative; z-index:1; }
.curveLabel{ flex:1; min-width:180px; }
.curveTitleRow{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
.curveWord{ font-family:var(--serif); font-style:italic; font-size:19px; color:var(--fg); }
.curveAt{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
.curveScrub{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:6px; opacity:0; transition:opacity .2s; }
.curveScrub.on{ opacity:1; }
.curveScrub .d{ width:6px; height:6px; border-radius:50%; background:var(--accent); }
.curveDesc{ font-size:13.5px; color:var(--muted); line-height:1.5; margin:8px 0 0; max-width:46ch; }
.curveEyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted2); margin:0 0 4px; }
.csubt{ font-family:var(--mono); font-size:11.5px; color:var(--muted2); }
.csubt .cdVal{ color:var(--accent2); }
.seg{ display:inline-flex; background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:var(--pill); padding:3px; gap:2px; margin-left:auto; }
.segBtn{ appearance:none; background:transparent; border:0; cursor:pointer; color:var(--muted); font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:7px 15px; border-radius:var(--pill); transition:all .2s; }
.segBtn.on{ background:rgba(52,211,153,.14); color:var(--accent2); }

.chartWrap{ position:relative; width:100%; }
.chartSvg{ position:relative; z-index:1; width:100%; height:300px; display:block; overflow:visible; touch-action:none; }
/* chart backdrop (ported from Graph Lab: aurora/particles/mountains/stars/grid/dots) */
.chartBg{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; border-radius:var(--radius-sm); }
.bgk-aurora{ background:radial-gradient(ellipse 60% 55% at 32% 60%, var(--c-soft), transparent 68%),radial-gradient(ellipse 50% 45% at 75% 38%, var(--c-soft), transparent 70%),linear-gradient(135deg,#0a120e 0%,#050806 100%); opacity:.6; }
.bgk-grid{ background-image:linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px); background-size:26px 26px; }
.bgk-dots{ background-image:radial-gradient(var(--c-soft) 1.1px, transparent 1.4px); background-size:18px 18px; opacity:.5; }
.bgk-mountains svg{ position:absolute; left:0; right:0; bottom:0; width:100%; height:62%; display:block; opacity:.7; }
.bgk-particles span{ position:absolute; width:2px; height:2px; border-radius:50%; background:var(--c); box-shadow:0 0 6px var(--c-glow); opacity:0; animation:gp-drift linear infinite; }
@keyframes gp-drift{ 0%{ transform:translate3d(0,0,0); opacity:0; } 12%{ opacity:.8; } 88%{ opacity:.5; } 100%{ transform:translate3d(var(--dx,10px),var(--dy,-120px),0); opacity:0; } }
.bgk-stars{ background:radial-gradient(ellipse 90% 70% at 50% -10%, #0a1118, #05070b 78%); }
.bgk-stars .milky{ position:absolute; left:-20%; right:-20%; top:38%; height:42%; transform:rotate(-18deg); filter:blur(14px); opacity:.5; background:linear-gradient(90deg, transparent, var(--c-soft) 35%, rgba(255,255,255,.10) 50%, var(--c-soft) 65%, transparent); }
.bgk-stars .star{ position:absolute; border-radius:50%; background:#fff; box-shadow:0 0 4px rgba(255,255,255,.6); animation:twinkle var(--tw,3s) ease-in-out infinite; }
.bgk-stars .star.tint{ background:var(--c); box-shadow:0 0 5px var(--c-glow); }
@keyframes twinkle{ 0%,100%{ opacity:.18; } 50%{ opacity:.95; } }
.bgk-stars .shoot{ position:absolute; width:90px; height:2px; border-radius:2px; opacity:0; background:linear-gradient(90deg, transparent, #fff 60%, var(--c)); box-shadow:0 0 8px var(--c-glow); animation:shoot var(--sd,7s) ease-in infinite; animation-delay:var(--sdelay,0s); }
@keyframes shoot{ 0%{ opacity:0; transform:translate(0,0) rotate(20deg) scaleX(.2); } 6%{ opacity:1; } 16%{ opacity:1; } 30%{ opacity:0; transform:translate(260px,95px) rotate(20deg) scaleX(1); } 100%{ opacity:0; transform:translate(260px,95px) rotate(20deg) scaleX(1); } }
.scrubLine{ position:absolute; top:0; bottom:30px; width:1px; background:rgba(255,255,255,.28); pointer-events:none; display:none; }
.scrubDot{ position:absolute; width:14px; height:14px; border-radius:50%; background:var(--warn); box-shadow:0 0 14px var(--warn),0 0 0 4px rgba(251,191,36,.18); transform:translate(-50%,-50%); pointer-events:none; display:none; }
.scrubTip{ position:absolute; transform:translate(-50%,-130%); background:var(--panel2); border:1px solid var(--line2); border-radius:10px; padding:8px 12px; pointer-events:none; display:none; white-space:nowrap; backdrop-filter:blur(8px); }
.scrubTip .v{ font-family:var(--serif); font-style:italic; font-size:18px; color:var(--accent); }
.scrubTip .l{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:1px; }
.dragTime{ position:absolute; bottom:34px; transform:translateX(-50%); display:none; background:var(--panel2); border:1px solid var(--accent2); border-radius:8px; padding:5px 11px; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--accent2); white-space:nowrap; pointer-events:none; z-index:7; box-shadow:0 4px 14px rgba(0,0,0,.55); }
.sleepMarks{ position:absolute; top:0; left:0; right:0; height:0; pointer-events:none; }
.sleepMark{ position:absolute; top:-6px; transform:translateX(-50%); font-family:var(--mono); font-size:9px; letter-spacing:.04em; color:var(--muted2); white-space:nowrap; background:var(--panel2); border:1px solid var(--line2); border-radius:7px; padding:3px 8px; }
.sleepLabels{ position:absolute; inset:0; pointer-events:none; z-index:2; }
.sleepLbl{ position:absolute; top:8px; transform:translateX(-50%); font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:rgba(110,231,183,.6); white-space:nowrap; }
.sleepLbl.wake{ color:var(--muted2); }
.sleepHit{ position:absolute; top:0; bottom:30px; z-index:2; cursor:pointer; }
.sleepHit:hover{ background:rgba(110,231,183,.05); }
.sleepEditBtn{ position:absolute; top:50%; transform:translate(-50%,-50%); z-index:6; appearance:none; cursor:pointer; white-space:nowrap; font-family:var(--mono); font-size:10px; letter-spacing:.04em; color:var(--accent2); background:var(--panel2); border:1px solid var(--line2); border-radius:9px; padding:8px 12px; box-shadow:0 8px 22px rgba(0,0,0,.55); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.sleepEditBtn:hover{ border-color:var(--accent); background:rgba(110,231,183,.12); }
.sleepEditPop{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:9; width:236px; background:var(--panel2); border:1px solid var(--line2); border-radius:14px; padding:16px 18px; box-shadow:0 20px 55px rgba(0,0,0,.7); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); }
.sleepEditTitle{ font-family:var(--serif); font-style:italic; font-size:17px; margin-bottom:13px; }
.sleepEditRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:11px; font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--muted2); }
.sleepStep{ display:inline-flex; align-items:center; gap:0; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
.sleepStepB{ appearance:none; cursor:pointer; width:34px; height:34px; border:0; background:none; color:var(--accent2); font-size:20px; line-height:1; display:grid; place-items:center; }
.sleepStepB:hover{ background:rgba(110,231,183,.14); color:var(--accent); }
.sleepStepB:active{ background:rgba(110,231,183,.24); }
.sleepStepV{ min-width:74px; text-align:center; font-family:var(--mono); font-size:13px; color:var(--fg); border-left:1px solid var(--line); border-right:1px solid var(--line); padding:8px 4px; }
.sleepEditBtns{ display:flex; gap:8px; margin-top:6px; }
.sleepEditCancel,.sleepEditSaveBtn{ flex:1; appearance:none; cursor:pointer; border-radius:8px; padding:9px; font-family:var(--mono); font-size:11px; letter-spacing:.04em; }
.sleepEditCancel{ background:none; border:1px solid var(--line); color:var(--muted2); }
.sleepEditCancel:hover{ color:var(--fg); border-color:var(--line2); }
.sleepEditSaveBtn{ border:0; font-weight:600; color:#04130c; background:linear-gradient(120deg,var(--accent),var(--accent2)); }
/* live "now" marker on the graph (ported from Schedule Lab): value bubble + dot + line, plus the bedtime moon */
.nowline{ position:absolute; top:0; bottom:18px; width:1px; background:rgba(255,255,255,.4); pointer-events:none; z-index:4; }
.nowdot{ position:absolute; width:13px; height:13px; border-radius:50%; background:#fff; border:2px solid var(--accent2); box-shadow:0 0 14px var(--accent2); transform:translate(-50%,-50%); pointer-events:none; z-index:5; }
.nowbubble{ position:absolute; transform:translate(-50%,calc(-100% - 14px)); background:var(--panel2); border:1px solid var(--line2); border-radius:11px; padding:6px 11px; text-align:center; box-shadow:0 8px 22px rgba(0,0,0,.5); pointer-events:none; z-index:5; -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.nowbubble b{ display:block; font-family:var(--serif); font-style:italic; font-size:20px; line-height:1; color:var(--fg); }
.nowbubble span{ font-family:var(--mono); font-size:9px; letter-spacing:.06em; color:var(--muted2); }
.nowmoon{ position:absolute; top:10px; transform:translateX(-50%); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; background:var(--panel2); border:1px solid var(--line2); border-radius:10px; padding:5px 10px; font-family:var(--mono); font-size:10px; color:var(--muted2); pointer-events:none; z-index:4; }
.taskMarks{ position:absolute; left:0; right:0; top:0; height:0; pointer-events:none; }
.taskMark{ position:absolute; top:-9px; transform:translateX(-50%); display:inline-flex; align-items:center; gap:6px; font-family:var(--serif); font-style:italic; font-size:13px; letter-spacing:.01em; color:var(--fg); white-space:nowrap; background:var(--panel2); border:1px solid var(--line); border-bottom:2px solid var(--dc); border-radius:8px; padding:3px 9px; max-width:150px; box-shadow:0 6px 18px -10px rgba(0,0,0,.9); pointer-events:auto; cursor:grab; touch-action:none; transition:left .12s var(--ease); }
.taskMark.dragging{ cursor:grabbing; transition:none; z-index:5; box-shadow:0 0 0 1px var(--dc),0 8px 22px -8px rgba(0,0,0,.9); }
.taskGrip{ font-family:var(--mono); font-style:normal; font-size:9px; color:var(--muted); }
.taskMark.gap{ opacity:.78; border-style:dashed; cursor:default; }
.gapChip{ border-style:dashed !important; opacity:.9; }
/* Schedule Lab band+pill overlay — band fill + glass/solid/outline/minimal pills */
.schBands{ position:absolute; inset:0; pointer-events:none; z-index:3; }
.schBand{ position:absolute; top:0; box-sizing:border-box; transition:left .12s var(--ease), width .12s var(--ease); }
.schBand.bd{ border-left:1px solid var(--bc,rgba(255,255,255,.25)); border-right:1px solid var(--bc,rgba(255,255,255,.25)); }
.schBand.gap{ opacity:.92; }
.schPill{ position:absolute; transform:translateX(-50%); display:inline-flex; align-items:center; gap:7px; white-space:nowrap; pointer-events:auto; cursor:grab; touch-action:none; transition:left .12s var(--ease); z-index:4; max-width:160px; }
.schPill.top{ top:10px; } .schPill.bottom{ bottom:calc(6% + 8px); } .schPill.mid{ top:46%; transform:translate(-50%,-50%); }
.schPill .pillNm{ font-family:var(--serif); font-style:italic; font-size:14px; letter-spacing:.01em; color:var(--fg); overflow:hidden; text-overflow:ellipsis; max-width:96px; }
.schPill .pillDur{ font-family:var(--mono); font-size:9px; opacity:.6; }
.schPill .pillNo{ display:inline-grid; place-items:center; min-width:15px; height:15px; padding:0 3px; border-radius:7px; font-family:var(--mono); font-size:9px; font-weight:700; color:#fff; background:rgba(0,0,0,.5); flex:none; }
.schPill.solid .pillNo{ background:rgba(0,0,0,.32); }
.schPill .pillIc{ font-size:12px; opacity:.9; flex:none; }
.schPill .pillTm{ font-family:var(--mono); font-size:9px; opacity:.72; letter-spacing:.01em; flex:none; }
.schPill.solid .pillTm{ color:#04140e; opacity:.75; }
.schPill.movable{ cursor:grab; } .schPill.locked{ cursor:default; }
.schPill .pillGrip{ font-family:var(--mono); font-style:normal; font-size:9px; color:var(--muted); }
.schPill.glass{ background:rgba(255,255,255,.07); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.16); padding:5px 11px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.35); }
.schPill.solid{ background:var(--pc); padding:5px 11px; border-radius:10px; } .schPill.solid .pillNm{ color:#04140e; } .schPill.solid .pillDur{ color:#04140e; opacity:.7; }
.schPill.outline{ background:rgba(0,0,0,.4); border:1px solid var(--pc); padding:5px 11px; border-radius:10px; } .schPill.outline .pillNm{ color:var(--pc); }
.schPill.minimal{ padding:2px; } .schPill.minimal .pillNm{ color:var(--pc); text-shadow:0 0 10px var(--pc); }
.schPill.dragging{ cursor:grabbing; transition:none; z-index:6; box-shadow:0 8px 22px -8px rgba(0,0,0,.9); }
.schPill.gap{ opacity:.82; cursor:default; }
.schPill.gap.glass, .schPill.gap.outline{ border-style:dashed; }
.schPill.locked{ cursor:default; }
/* lock toggle pinned to the bottom of each task's band */
.schLock{ position:absolute; transform:translateX(-50%); z-index:5; pointer-events:auto; cursor:pointer; width:22px; height:21px; display:grid; place-items:center; font-size:10px; line-height:1; padding:0; background:rgba(4,6,5,.7); border:1px solid var(--line); border-radius:7px; transition:border-color .15s, transform .12s; }
.schLock:hover{ transform:translateX(-50%) scale(1.12); }
.schLock.on{ border-color:rgba(255,255,255,.32); }
.schLock:not(.on){ border-color:rgba(110,231,183,.55); box-shadow:0 0 10px -3px var(--accent); }
.crashMarks{ position:absolute; left:0; right:0; bottom:34px; height:0; pointer-events:none; }
.crashMark{ position:absolute; transform:translateX(-50%); font-family:var(--mono); font-size:9px; letter-spacing:.04em; color:#fca5a5; white-space:nowrap; background:var(--panel2); border:1px solid rgba(239,68,68,.45); border-radius:7px; padding:3px 8px; }
.sleepPlan{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:11px 15px; margin-bottom:16px; border:1px solid var(--line); border-radius:var(--radius-sm); background:rgba(255,255,255,.02); }
.spItem{ font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
.spItem b{ color:var(--fg); font-family:var(--serif); font-style:italic; font-size:16px; text-transform:none; letter-spacing:0; margin-left:3px; }
.spDot{ color:var(--muted); }
.spNote{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-left:auto; }
.xAxis{ display:flex; justify-content:space-between; margin-top:8px; padding:0 2px; }
.xAxis span{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:var(--muted); }

.plan{ margin-top:26px; }
.planLabel{ font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted2); margin:0 0 12px; }
.planEmpty{ border:1px dashed var(--line2); border-radius:var(--radius-sm); padding:18px; text-align:center; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* modal */
.overlay{ position:fixed; inset:0; background:rgba(2,6,4,.72); backdrop-filter:blur(6px); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal{ width:100%; max-width:520px; max-height:90dvh; overflow:auto; background:var(--bg2); border:1px solid var(--line2); border-radius:var(--radius); padding:26px; }
.modalHead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.modalTitle{ font-family:var(--serif); font-style:italic; font-size:24px; margin:0; }
.modalClose{ appearance:none; background:none; border:0; color:var(--muted); font-size:24px; cursor:pointer; line-height:1; }
.fGrid{ display:grid; grid-template-columns:1fr 1fr; gap:13px; }
.f{ display:flex; flex-direction:column; gap:6px; }
.fFull{ grid-column:1 / -1; }
.fLab{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.fIn{ width:100%; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:10px; padding:11px 12px; color:var(--fg); font-family:var(--ui); font-size:14px; }
.fIn:focus{ outline:none; border-color:var(--accent); }
.fNote{ font-size:12.5px; color:var(--muted); line-height:1.5; margin:14px 0; }
.fNote b{ color:var(--muted2); }
.primary{ width:100%; appearance:none; cursor:pointer; margin-top:16px; padding:14px; border:0; border-radius:12px; font-family:var(--mono); font-weight:600; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:#04130c; background:linear-gradient(120deg,var(--accent),var(--accent2)); box-shadow:0 0 24px -6px var(--glow); }
.connectBtn{ display:inline-block; margin-top:6px; padding:12px 20px; border-radius:12px; font-family:var(--mono); font-weight:600; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#04130c; background:linear-gradient(120deg,var(--accent),var(--accent2)); text-decoration:none; box-shadow:0 0 24px -6px var(--glow); }

.empty{ text-align:center; padding:50px 20px; }
.emptyTitle{ font-family:var(--serif); font-style:italic; font-size:26px; }
.emptyBody{ font-size:14px; color:var(--muted2); line-height:1.6; margin:12px auto 0; max-width:42ch; }

/* day history cards */
.dayRow{ display:flex; gap:9px; overflow-x:auto; padding:2px 2px 8px; margin:0 0 20px; scrollbar-width:none; }
.dayRow::-webkit-scrollbar{ display:none; }
.dayCard{ flex:0 0 auto; width:62px; cursor:pointer; border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,.02); padding:10px 0; text-align:center; transition:all .18s var(--ease); }
.dayCard:hover{ border-color:var(--line2); }
.dayCard.on{ border-color:var(--accent); background:rgba(52,211,153,.08); }
.dayCard.today .dayWk{ color:var(--accent); }
.dayWk{ font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.dayNum{ font-family:var(--serif); font-size:20px; color:var(--fg); margin:3px 0 6px; line-height:1; }
.dayScore{ width:30px; height:30px; margin:0 auto; border-radius:50%; display:grid; place-items:center; font-family:var(--mono); font-size:11px; font-weight:600; border:2px solid var(--dsc,rgba(255,255,255,.1)); color:var(--dsc,var(--muted)); }
.dayScore.empty2{ border-style:dashed; }

/* tap-rating rows */
.rateRow{ display:flex; align-items:center; gap:12px; margin-bottom:11px; flex-wrap:wrap; }
.rateLab{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted2); width:108px; flex-shrink:0; }
.chips{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.chip{ appearance:none; cursor:pointer; min-width:40px; padding:9px 12px; border-radius:10px; border:1px solid var(--line); background:rgba(255,255,255,.02); color:var(--muted2); font-family:var(--mono); font-size:13px; transition:all .15s var(--ease); }
.chip:hover{ border-color:var(--line2); color:var(--fg); }
.chip.on{ background:linear-gradient(120deg,var(--accent),var(--accent2)); border-color:transparent; color:#04130c; font-weight:600; box-shadow:0 0 16px -6px var(--glow); }
.chip.warnOn.on{ background:linear-gradient(120deg,#FBBF24,#fcd34d); }
.chipWord{ font-family:var(--serif); font-style:italic; font-size:14px; color:var(--accent2); margin-left:4px; }
.blockLab{ font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin:20px 0 12px; }
.derived{ font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--muted); margin-top:10px; }
.derived b{ color:var(--accent2); }
.miniIn{ width:72px; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:10px; padding:9px 11px; color:var(--fg); font-family:var(--ui); font-size:14px; }
.miniIn:focus{ outline:none; border-color:var(--accent); }
.pulseBtn{ appearance:none; cursor:pointer; padding:9px 11px; border-radius:9px; border:1px solid var(--line2); background:rgba(110,231,183,.06); color:var(--accent2); font-family:var(--mono); font-size:11px; }
.pulseBtn:hover{ background:rgba(110,231,183,.15); }
.pulseRing{ position:relative; width:34px; height:34px; display:none; place-items:center; flex-shrink:0; }
.pulseRing.on{ display:inline-grid; }
.pulseRing svg{ position:absolute; inset:0; transform:rotate(-90deg); }
.pulseRing .pt{ fill:none; stroke:rgba(255,255,255,.1); stroke-width:3; }
.pulseRing .pf{ fill:none; stroke:var(--accent); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--accent)); }
.pulseCount{ position:relative; z-index:1; font-family:var(--mono); font-size:11px; color:var(--fg); }
@media (max-width:520px){ .rateLab{ width:100%; } }

/* nasdaq-style scrolling ticker */
.tkTrack{ display:flex; align-items:center; animation:marquee 36s linear infinite; will-change:transform; }
.ticker:hover .tkTrack{ animation-play-state:paused; }
@keyframes marquee{ from{ transform:translateX(0) } to{ transform:translateX(-50%) } }

/* feel-now bar */
.feelBar{ display:flex; align-items:center; gap:18px; border:1px solid var(--line); border-radius:var(--radius); background:var(--panel); padding:16px 22px; margin-bottom:20px; flex-wrap:wrap; }
.feelHead{ flex-shrink:0; }
.feelTitle{ font-family:var(--serif); font-style:italic; font-size:18px; }
.feelNote{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:3px; }
.feelNote.ready{ color:var(--accent); }
.feelSliderWrap{ flex:1; min-width:180px; display:flex; align-items:center; gap:16px; }
.feelSlider{ -webkit-appearance:none; appearance:none; flex:1; height:8px; border-radius:99px; background:linear-gradient(90deg,var(--low),var(--warn),var(--accent)); outline:none; }
.feelSlider::-webkit-slider-thumb{ -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#eafff4; border:3px solid var(--accent); cursor:pointer; box-shadow:0 0 12px var(--glow); }
.feelSlider::-moz-range-thumb{ width:22px; height:22px; border-radius:50%; background:#eafff4; border:3px solid var(--accent); cursor:pointer; }
.feelPct{ font-family:var(--serif); font-style:italic; font-weight:600; font-size:32px; min-width:64px; text-align:right; }

/* caffeine card */
.cafHero{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.cafHeroV{ font-family:var(--serif); font-style:italic; font-weight:600; font-size:32px; }
.cafHeroV small{ font-family:var(--mono); font-size:11px; color:var(--muted); font-style:normal; letter-spacing:.04em; }

/* ---- recovery estimate (same logic as the dashboard) ---- */
function estRecovery(h){
  if(!h) return null;
  if(h.recovery!=null) return h.recovery;
  const parts=[],w=[];
  const hb=hrvBaseline(), rb=rhrBaseline();
  if(typeof h.hrv==='number'){
    // vs YOUR baseline when we have history; else population anchor
    const s = hb ? clamp(50+((h.hrv/hb)-1)*200,5,99) : clamp01((h.hrv-20)/(90-20))*100;
    parts.push(s); w.push(0.5);
  }
  if(typeof h.rhr==='number'){
    const s = rb ? clamp(50+(1-(h.rhr/rb))*300,5,99) : clamp01((80-h.rhr)/(80-42))*100;
    parts.push(s); w.push(0.25);
  }
  if(typeof h.sleepPerf==='number'){ parts.push(Math.min(100,h.sleepPerf)); w.push(0.25); }
  else if(typeof h.sleepHours==='number'){ parts.push(clamp01(h.sleepHours/(h.sleepTargetHours||8))*100); w.push(0.25); }
  if(!parts.length) return null;
  const sw=w.reduce((a,b)=>a+b,0); let s=0; for(let i=0;i<parts.length;i++)s+=parts[i]*w[i];
  return Math.max(1,Math.min(99,Math.round(s/sw)));
}

/* subjective readiness — for the Manual no-band form (Hooper Index model) */
function subjReadiness(s){

  if(s.energy){parts.push(up(s.energy));w.push(0.25);}
  if(s.soreness){parts.push(down(s.soreness));w.push(0.20);}
  if(s.stress){parts.push(down(s.stress));w.push(0.15);}
  if(s.mood){parts.push(up(s.mood));w.push(0.10);}
  if(!parts.length) return null;
  const sw=w.reduce((a,b)=>a+b,0); let x=0; for(let i=0;i<parts.length;i++)x+=parts[i]*w[i];

/* ---- times ---- */
function parseHM(s){ if(!s)return null; const m=String(s).match(/(\d{1,2}):(\d{2})/); if(!m)return null; return (+m[1])+(+m[2])/60; }
function wakeBed(){ const h=health(); let wake=parseHM(h&&h.wakeTime), bed=parseHM(h&&h.bedtime);
  if(wake==null||bed==null){ const hw=histWakeBed(); if(wake==null)wake=hw.wake; if(bed==null)bed=hw.bed; } // your real chronotype
  if(wake==null)wake=7; if(bed==null)bed=23; return {wake,bed}; }
/* do we have a REAL wake/bed time from vitals (manual / Apple) or your history?
 * Whoop gives sleep duration but not a wake clock-time, so that alone isn't enough. */
function hasWakeBedData(){ const h=health(); if(h&&(h.wakeTime||h.bedtime))return true; const hw=histWakeBed(); return hw.wake!=null||hw.bed!=null; }
function clockOf(t){ t=((t%24)+24)%24; let hh=Math.floor(t); const mm=Math.round((t-hh)*60); let m2=mm; if(m2===60){hh+=1;m2=0;} const ap=hh<12?'AM':'PM'; let h12=hh%12; if(h12===0)h12=12; return h12+(m2?':'+String(m2).padStart(2,'0'):'')+' '+ap; }
function nowT(){ const d=new Date(); return d.getHours()+d.getMinutes()/60; }
function tToMs(t){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime()+t*3600000; }

/* ---- scores ---- */
function sleepPerfOf(h){ if(!h)return null; if(typeof h.sleepPerf==='number')return Math.min(100,h.sleepPerf); if(typeof h.sleepHours==='number')return Math.round(clamp01(h.sleepHours/(h.sleepTargetHours||8))*100); return null; }
/* Daily overall score. Recovery + Sleep always count; Water, Macros and Gym are
 * OPTIONAL — they only join the blend on days you actually logged them (no penalty
 * for skipping). Weights renormalise over whatever's present. */
function overall(){
  const h=health();
  const parts=[],w=[],labels=[];
  const rec=estRecovery(h);   if(rec!=null){ parts.push(rec); w.push(0.45); labels.push(['Recovery',rec,true]); }
  const sp=sleepPerfOf(h);    if(sp!=null){ parts.push(sp); w.push(0.30); labels.push(['Sleep',sp,true]); }
  if(waterLoggedToday()){ const hyd=Math.round(clamp01(drinksToday()/waterTarget())*100); parts.push(hyd); w.push(0.10); labels.push(['Hydration',hyd,false]); }
  const ms=macrosScore(); if(ms!=null){ parts.push(ms); w.push(0.10); labels.push(['Protein',ms,false]); }
  const ss=suppsScore(); if(ss!=null){ parts.push(ss); w.push(0.07); labels.push(['Supplements',ss,false]); }
  if(gymLoggedToday()){ parts.push(100); w.push(0.05); labels.push(['Trained',100,false]); }
  if(!parts.length) return { score:null, objective:null, feel:null, adj:0, feelW:0, labels:[] };
  const sw=w.reduce((a,b)=>a+b,0); let s=0; for(let i=0;i<parts.length;i++)s+=parts[i]*w[i];
  const objective=Math.round(s/sw);
  // Blend + learn: your "how I feel" pulls the score toward your felt state. The
  // pull starts gentle (30%) and grows as your check-ins prove reliable (→50%
  // over 30 days), so the more you use it the more it trusts you.
  const f=latestFeelToday();
  let score=objective, adj=0, feelW=0;
  if(f!=null){ feelW=0.30+0.20*calibStrength(); score=Math.round(objective+(f-objective)*feelW); adj=score-objective; }
  return { score, objective, feel:f, adj, feelW:Math.round(feelW*100), labels };
}

/* ---- feel-check store (the little "how I feel right now" slider) ---- */
const FLOG='peak_feel_v1';
function loadFeel(){ if(_feelC!==undefined)return _feelC; const r=readLS(FLOG); _feelC=(r&&Array.isArray(r.checks))?r:{checks:[]}; return _feelC; }
function saveFeel(f){ _feelC=f; try{ localStorage.setItem(FLOG,JSON.stringify(f)); }catch(e){} if(window.PatronDB&&PatronDB.isCloud())PatronDB.set('peakfeel',f); }
// One check per session: if you slid it again within ~20 min, update that entry
// instead of piling up dozens of points (keeps the slider value + clean learning data).
function addFeel(pct){ const f=loadFeel(); const now=Date.now(); const last=f.checks[f.checks.length-1];
  if(last && (now-last.t)<20*60000 && dayKey(new Date(last.t))===dayKey(new Date(now))){ last.pct=pct; last.t=now; last.pred=Math.round(energyRaw(nowT())); }
  else { f.checks.push({t:now,pct:pct,pred:Math.round(energyRaw(nowT()))}); }
  if(f.checks.length>2000)f.checks.shift(); saveFeel(f); }
function latestFeelToday(){ const f=loadFeel(); const today=dKey(); let best=null; for(const c of f.checks){ if(dayKey(new Date(c.t))===today)best=c; } return best?best.pct:null; }
function feelDays(){ const f=loadFeel(); const set={}; f.checks.forEach(c=>{ set[dayKey(new Date(c.t))]=1; }); return Object.keys(set).length; }
// Personal calibration: average gap between how you FELT and what we PREDICTED,
// applied gradually — full strength only after ~30 days of check-ins.
function personalBias(){ const f=loadFeel(); if(f.checks.length<3)return 0; let s=0,n=0; f.checks.forEach(c=>{ if(typeof c.pred==='number'&&typeof c.pct==='number'){ s+=(c.pct-c.pred); n++; } }); if(!n)return 0; return clamp(s/n,-25,25); }
// time-of-day calibration: learns that YOUR morning/afternoon/evening differs from the model
function feelBucket(hr){ hr=((hr%24)+24)%24; return hr<12?'m':hr<17?'a':'e'; }
function personalBiasAt(t){ const f=loadFeel(); if(f.checks.length<3)return personalBias(); const b=feelBucket(t); let s=0,n=0; f.checks.forEach(c=>{ if(typeof c.pred==='number'&&typeof c.pct==='number'&&feelBucket(new Date(c.t).getHours())===b){ s+=(c.pct-c.pred); n++; } }); return n>=2?clamp(s/n,-25,25):personalBias(); }
function personalAdjAt(t){ return personalBiasAt(t)*calibStrength(); }
function calibStrength(){ return Math.min(1, feelDays()/30); }
function personalAdj(){ return personalBias()*calibStrength(); }
function toneOf(v){ if(v==null)return {c:'var(--muted)',word:'—'}; if(v>=80)return {c:'var(--accent)',word:'Prime'}; if(v>=67)return {c:'var(--accent)',word:'Solid'}; if(v>=45)return {c:'var(--warn)',word:'Moderate'}; if(v>=30)return {c:'var(--warn)',word:'Low'}; return {c:'var(--low)',word:'Depleted'}; }

/* ---- energy curve model ----
 * Two circadian peaks (morning ~3h after wake, evening ~3h before bed),
 * amplitude scaled by recovery, plus a caffeine boost from the PK model. */
function recScale(){ const rec=estRecovery(health()); const r=rec==null?70:rec; let s=0.58+0.42*(r/100); s*=(1-clamp(sleepDebt()*0.025,0,0.18)); return s; } // multi-day sleep debt lowers the ceiling
/* Physiologically-grounded circadian arousal (0..~0.9):
 * sleep inertia after waking → broad daytime plateau → a SHALLOW post-lunch dip
 * (~45% through your waking day) → an evening second-wind → wind-down before bed →
 * a proper low through the night (lowest mid-sleep). The afternoon dip is gentle,
 * never below your nighttime level. */
function shape(t,wake,bed){
  const L=(((bed-wake)%24)+24)%24 || 16;        // hours awake
  let aw=(((t-wake)%24)+24)%24;                  // hours since waking
  if(aw>L){                                      // asleep
    const into=aw-L, sleepLen=24-L||8, mid=sleepLen/2;
    return 0.12 - 0.07*(1-Math.abs(into-mid)/mid); // 0.05 mid-sleep → 0.12 near edges
  }
  const inertia=0.55+0.45*(1-Math.exp(-aw/1.0));        // groggy → alert over ~3h
  const decline=1-0.16*(aw/L);                          // homeostatic sleep pressure
  const winddown=1-0.40*clamp((aw-(L-1.5))/1.5,0,1);    // taper in the last 1.5h
  const dip=0.13*Math.exp(-Math.pow(aw-L*0.45,2)/(2*1.7*1.7));  // post-lunch dip (shallow)
  const eve=0.07*Math.exp(-Math.pow(aw-(L-4),2)/(2*2.0*2.0));   // evening second wind
  return Math.max(0.04, 0.92*inertia*decline*winddown - dip + eve);
}
/* Caffeine net effect: a boost while it's in your system, then a rebound DIP
 * below baseline as it clears (adenosine rebound = the crash). */
function caffNet(t){
  const cur=bodyAt(tToMs(t));
  let mx=cur; for(let dt=0.5; dt<=5; dt+=0.5){ const b=bodyAt(tToMs(t-dt)); if(b>mx)mx=b; }
  const boost=Math.min(22, cur*0.14*caffSensitivity()); // tolerance: habitual users get less lift
  const rebound=Math.min(13, Math.max(0, mx-cur)*0.10);
  return boost-rebound;
}
// raw prediction (no personal calibration) — used to measure the feel-gap
function energyRaw(t){ const {wake,bed}=wakeBed(); const rs=recScale(); const base=clamp(shape(t,wake,bed)*100*rs,1,100); return clamp(base+caffNet(t)+medNet(t),1,100); }
function energyAt(t){
  const {wake,bed}=wakeBed(); const rs=recScale();
  const base=clamp(shape(t,wake,bed)*100*rs+personalAdjAt(t),1,100); // time-of-day personal calibration
  const sub=caffNet(t)+medNet(t);   // caffeine + meds/substances, with their comedowns
  return { base, caf:sub, e:clamp(base+sub,1,100) };
}
function buildCurve(){ const a=[]; for(let t=0;t<=24;t+=0.5){ const v=energyAt(t); a.push({t,base:v.base,caf:v.caf,e:v.e}); } return a; }
function peakOf(curve){ const {wake,bed}=wakeBed(); let best=curve[0]; for(const p of curve){ const inDay=bed>wake?(p.t>=wake&&p.t<=bed):(p.t>=wake||p.t<=bed); if(inDay&&p.e>best.e)best=p; } if(best.e<=2){ for(const p of curve)if(p.e>best.e)best=p; } return best; }
// Optimal sleep window = the bedtime that banks your full sleep target before your wake.
function optimalSleep(){ const h=health(); const wake=wakeBed().wake; const need=(h&&typeof h.sleepTargetHours==='number')?h.sleepTargetHours:8; const bed=((wake-need)%24+24)%24; return {bed:Math.round(bed*4)/4, wake:Math.round(wake*4)/4, need}; }
/* the sleep window we DRAW: wake comes from vitals (the past), but bedtime is
 * YOUR choice — use it when you've set one, else fall back to the recommended bed. */
function planSleep(){ const h=health(); const wake=wakeBed().wake; const bedH=(h&&h.bedtime)?parseHM(h.bedtime):null;
  const bed=(bedH!=null)?bedH:optimalSleep().bed; return {wake:Math.round(wake*4)/4, bed:Math.round(bed*4)/4}; }
function floatTo24(t){ t=((t%24)+24)%24; let H=Math.floor(t), M=Math.round((t-H)*60); if(M===60){H++;M=0;} return String(H%24).padStart(2,'0')+':'+String(M).padStart(2,'0'); }

/* ============================================================
 * Schedule — natural-language tasks mapped onto the peak curve
 * ============================================================ */
const SCHED='peak_schedule_v1'; let planOpen=false;
/* Baked schedule shipped from Schedule Lab — the day's template. SCHED_SEED is
 * bumped every time a new schedule is shipped, so a fresh ship overrides any
 * stale saved tasks once (the file is the source of truth, like the style),
 * while still letting you add/drag/edit in Peak afterwards (your edits save
 * under today's key with the current seed and win until the next day or ship). */
const SCHED_SEED='lab-2026-06-07T-SCRIM';
const DEFAULT_SCHED=[];
/* one-time cleanup: physically drop a schedule saved by an older build (seed
 * mismatch) so stale/overlapping tasks can't linger in localStorage. */
try{ const _r=readLS(SCHED); if(_r&&_r.seed!==SCHED_SEED){ localStorage.removeItem(SCHED); } }catch(e){}
/* one-time hard reset: clears any saved schedule (and its dead cloud mirror) ONCE
 * per browser, then sets a flag so your later edits stick. Bump SCHED_NUKE to force
 * a fresh wipe everywhere — used to clear the stuck 6:45 schedule on existing devices. */
const SCHED_NUKE='peak_sched_nuke_v3';
try{ if(localStorage.getItem('peak_sched_nuked')!==SCHED_NUKE){ localStorage.removeItem(SCHED); localStorage.removeItem('patron_db_peaksched'); localStorage.setItem('peak_sched_nuked',SCHED_NUKE); } }catch(e){}
/* Defensive heal: tasks must NEVER overlap on screen — not even if older/stale
 * saved data (or a cloud restore) stacked several onto 6:45. Locked tasks hold
 * their time; any movable task that overlaps an already-placed one is reflowed
 * into the next free slot. Runs on every load so a dirty schedule self-corrects
 * the instant it's read (and persists clean on the next save). */
function sanitizeSched(tasks){ if(!Array.isArray(tasks))return tasks;
  const fixed=tasks.filter(t=>t&&!t.gap), gaps=tasks.filter(t=>t&&t.gap);
  const placed=[], result=[];
  const overlaps=(s,e)=>placed.some(p=>s<p.end-1e-6 && e>p.start+1e-6);
  // Every task keeps the EXACT time you typed. The only adjustment: if two tasks would
  // occupy the same slot, the later one is nudged to the next free gap so they can't
  // hide behind each other. No auto-placement, no dawn floor.
  fixed.slice().sort((a,b)=>((a.start==null?1e9:a.start)-(b.start==null?1e9:b.start))).forEach(t=>{
    const dur=taskDur(t); let s=t.start;
    if(s==null||overlaps(s,s+dur)){ s=snapFree(s==null?wakeBed().wake:s, dur, placed); }
    t.start=s; t.end=Math.min(24,s+dur); t.durH=t.end-t.start;
    placed.push({start:t.start,end:t.end}); result.push(t);
  });
  return result.concat(gaps).sort((a,b)=>((a.start==null?1e9:a.start)-(b.start==null?1e9:b.start))); }
function loadSched(){ const r=readLS(SCHED); const tasks=(r&&r.seed===SCHED_SEED&&r.day===dKey()&&Array.isArray(r.tasks))?r.tasks:DEFAULT_SCHED.map(t=>Object.assign({},t)); return sanitizeSched(tasks); }
function saveSched(tasks){ try{ localStorage.setItem(SCHED,JSON.stringify({day:dKey(),seed:SCHED_SEED,tasks})); }catch(e){} if(window.PatronDB&&PatronDB.isCloud())PatronDB.set('peaksched',{day:dKey(),seed:SCHED_SEED,tasks}); render(); }
function diffOf(s){ if(/\b(high|hard|intense|deep|heavy|max|pr|grind)\b/i.test(s))return 'hard'; if(/\b(low|easy|chill|light|admin|rest|relax|recover)\b/i.test(s))return 'easy'; return 'med'; }

const SCHED_STYLE_DEFAULT={ fill:'grad', op:0.18, rad:10, colorMode:'auto', acc:'#6EE7B7', pill:'glass', pos:'top', bd:true, icon:true, dur:true, now:true, valcol:false, diff:{ easy:'#6EE7B7', med:'#F59E0B', hard:'#FF50A6' } };
try{ localStorage.removeItem('peak_sched_style_v1'); }catch(e){}
/* ----------------------------------------------------------------------
 * Creator themes — a shareable "look" (graph/accent color + background +

 * PEAK-THEME code. SCHED_STYLE_DEFAULT is the baked default; an imported

function loadTheme(){ try{ const t=JSON.parse(localStorage.getItem(PEAK_THEME)||'null'); return (t&&(t.style||t.bg||t.graph||t.bgAnim))?t:null; }catch(e){ return null; } }
/* the energy-curve look — defaults to the shipped "stepped area" design; a pasted

function graphStyle(){ const t=loadTheme(); const g=(t&&t.graph)||{};

/* Anti-overlap pass (ported from Schedule Lab): measure each pill, keep it over

let schTopLanes=null, schRowH=38;
function layoutSchedPills(){
  const ov=document.getElementById('schBands'); if(!ov)return;
  const W=ov.clientWidth, H=ov.clientHeight; if(!W)return;
  const refs=[...ov.querySelectorAll('.schPill,.nowmoon')].map(el=>({
    el, pos: el.classList.contains('bottom')?'bottom':(el.classList.contains('mid')?'mid':'top'),
    centerPct:+(el.dataset.cpct||0),
    startPct: el.dataset.spct!=null?+el.dataset.spct:null,
    endPct: el.dataset.epct!=null?+el.dataset.epct:null
  }));
  const groups={}; refs.forEach(r=>{ (groups[r.pos]=groups[r.pos]||[]).push(r); });
  Object.keys(groups).forEach(pos=>{
    const list=groups[pos];
    list.forEach(r=>{ const w=r.el.offsetWidth; r.w=w; r.h=r.el.offsetHeight;
      let cx=W*r.centerPct/100;
      if(r.startPct!=null){ const bl=W*r.startPct, br=W*r.endPct; if(br-bl>w+8) cx=clamp(cx, bl+w/2+2, br-w/2-2); }
      cx=clamp(cx, w/2+4, W-w/2-4); r.cx=cx; r.l=cx-w/2; r.rgt=cx+w/2; });
    list.sort((a,b)=>a.cx-b.cx);
    const lanes=[], G=10, rowH=((list[0]&&list[0].h)||30)+8;
    list.forEach(r=>{ let lane=0;
      while(lane<24){ const occ=lanes[lane]||(lanes[lane]=[]);
        const hit=occ.some(s=>!(r.rgt<s[0]-G||r.l>s[1]+G));
        if(!hit){ occ.push([r.l,r.rgt]); break; } lane++; }

      if(pos==='bottom') top=(H-12-ph)-lane*rowH;
      else if(pos==='mid') top=(H/2-ph/2)+lane*rowH;
      else top=12+lane*rowH;
      r.el.style.left=r.cx+'px'; r.el.style.top=top+'px'; r.el.style.bottom='auto'; r.el.style.transform='translateX(-50%)';
    });
    if(pos==='top'){ schTopLanes=lanes; schRowH=rowH; }
  });

function dodgeSchedBubble(bub, nxPct){
  const ov=document.getElementById('schBands'); if(!ov)return; const W=ov.clientWidth; if(!W)return;
  const bw=bub.offsetWidth, cx=clamp(W*nxPct/100, bw/2+4, W-bw/2-4), l=cx-bw/2, r=cx+bw/2;
  const lanes=schTopLanes||[], rowH=schRowH||38; let maxLane=-1;
  lanes.forEach((occ,i)=>{ if(occ&&occ.some(s=>!(r<s[0]-10||l>s[1]+10))) maxLane=Math.max(maxLane,i); });
  if(maxLane>=0){ bub.style.left=cx+'px'; bub.style.top=(12+(maxLane+1)*rowH)+'px'; bub.style.transform='translateX(-50%)'; }
}

function curveAtT(t){ // interpolate energy at arbitrary t

function setScrub(t,clientX){
  const wrap=document.getElementById('chartWrap'); if(!wrap)return;

  line.style.display='block'; line.style.left=xPct+'%';

function bindScrub(){
  const svg=document.getElementById('chartSvg'); const wrap=document.getElementById('chartWrap'); if(!svg||!wrap)return;

function blankDraft(){ return {sleepQ:null,energy:null,mood:null,soreness:null,stress:null,wakeTime:null,sleepHours:null,rhr:null}; }
function loadDraft(dk){ const d=loadLog().days[dk]; draft = d?Object.assign(blankDraft(),d):blankDraft(); }
// Carry over yesterday's schedule (wake/hours) so today pre-fills and you only change what differs.
function prefillSchedule(){ if(draft.wakeTime!=null||draft.sleepHours!=null)return; const log=loadLog(); const keys=Object.keys(log.days).sort(); for(let i=keys.length-1;i>=0;i--){ const d=log.days[keys[i]]; if(d&&(d.wakeTime||d.sleepHours)){ if(draft.wakeTime==null)draft.wakeTime=d.wakeTime||null; if(draft.sleepHours==null)draft.sleepHours=d.sleepHours||null; break; } } }

function hmToFloat(s){ if(!s)return null; const [h,m]=String(s).split(':').map(Number); return h+(m||0)/60; }
function deriveBed(wakeTime,hours){ if(!wakeTime||hours==null)return null; const [wh,wm]=wakeTime.split(':').map(Number); let mins=(wh*60+(wm||0))-Math.round(hours*60); mins=((mins%1440)+1440)%1440; return String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0'); }

function saveHealth(d){ try{ localStorage.setItem('patron_health_v1',JSON.stringify(d)); }catch(e){} }
async function pickSource(src){
  if(src==='manual'){ selectedSrc='manual'; render(); const el=document.querySelector('.manualCard'); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); return; }
  selectedSrc=src;
  if(!ON_SERVER){ alert('Whoop & Apple Watch sync run on the deployed site (Vercel). Open your live dashboard URL to connect them, or use Manual here.'); return; }
  if(src==='whoop'){
    const cached=readLS('patron_health_v1');
    const haveWhoop = cached && cached.source==='whoop' && cached.connected;
    try{ const r=await fetch('/api/whoop/data',{cache:'no-store'}); const j=await r.json();
      if(j&&j.connected){ saveHealth({source:'whoop',connected:true,ts:j.ts||Date.now(),recovery:j.recovery,sleepHours:j.sleepHours,sleepPerf:j.sleepPerf,sleepTargetHours:j.sleepTargetHours||8,hrv:j.hrv,rhr:j.rhr,strain:j.strain}); render(); return; }
    }catch(e){}
    // Live refresh didn't confirm a connection. If we already have Whoop data, just
    // keep showing it — never bounce to a (possibly failing) re-login automatically.
    if(haveWhoop){ render(); return; }
    if(confirm('Connect your Whoop account? You’ll log in on whoop.com.')) location.href='/api/whoop/login';
    else { selectedSrc=null; render(); }
    return;
  }
  if(src==='apple'){
    const cached=readLS('patron_health_v1');
    const haveApple = cached && cached.source==='apple' && cached.connected;
    try{ const r=await fetch('/api/apple',{cache:'no-store'}); const j=await r.json();
      if(j&&j.connected){ saveHealth({source:(j.source==='manual'?'manual':'apple'),connected:true,ts:j.ts||Date.now(),recovery:j.recovery,sleepHours:j.sleepHours,sleepPerf:j.sleepPerf,sleepTargetHours:j.sleepTargetHours||8,bedtime:j.bedtime,wakeTime:j.wakeTime,hrv:j.hrv,rhr:j.rhr,strain:j.strain}); render(); return; }
    }catch(e){}
    if(haveApple){ render(); return; }
    alert('No Apple Watch data yet. Set up the iPhone Shortcut that posts to /api/apple (see APPLE_WATCH_SHORTCUT.md), then tap Apple Watch again.');
    selectedSrc=null; render();
    return;
  }
}

function saveManual(){
  // pull resting pulse (the one free-typed field) into the draft
  const rEl=document.getElementById('m-rhr'); if(rEl){ const n=Number(rEl.value); draft.rhr=(rEl.value!==''&&isFinite(n))?n:null; }
  const {sleepQ,energy,mood,soreness,stress,wakeTime,sleepHours,rhr}=draft;
  const readiness=subjReadiness({sleepQ,energy,mood,soreness,stress});
  if(readiness==null&&sleepHours==null&&rhr==null){ alert('Tap at least how you feel — or pick your sleep.'); return; }
  const target=8;
  const sleepPerf=sleepHours!=null?Math.round(Math.min(100,sleepHours/target*100)):null;
  const bedtime=deriveBed(wakeTime,sleepHours);
  const entry={sleepQ,energy,mood,soreness,stress,wakeTime,sleepHours,bedtime,rhr,readiness,sleepPerf,ts:Date.now()};
  // 1) write to the per-day history log
  const log=loadLog(); log.days[selectedDate]=entry; saveLog(log);
  // 2) if it's today, also publish to the suite-wide vitals so scores/curve + other apps update
  if(selectedDate===dayKey()){

function captureRhr(){ const el=document.getElementById('m-rhr'); if(el&&draft){ const n=Number(el.value); draft.rhr=(el.value!==''&&isFinite(n))?n:null; } }
/* pulse-counter timer: a ring fills over 10s/30s; you count beats, it → BPM */
let pulseIntv=null;
function startPulse(dur){
  if(pulseIntv){ clearInterval(pulseIntv); pulseIntv=null; }
  const ring=document.getElementById('pulseRing'), fill=document.getElementById('pulseFill'), count=document.getElementById('pulseCount'), hint=document.getElementById('pulseHint');
  if(!ring||!fill) return;
  const C=2*Math.PI*14; fill.style.strokeDasharray=C; fill.style.strokeDashoffset=C;
  ring.classList.add('on'); if(hint)hint.textContent='counting… '+dur+'s';
  const start=Date.now();
  pulseIntv=setInterval(()=>{
    const el=(Date.now()-start)/1000, frac=Math.min(1,el/dur);
    fill.style.strokeDashoffset=C*(1-frac);
    if(count)count.textContent=Math.max(0,Math.ceil(dur-el));
    if(frac>=1){
      clearInterval(pulseIntv); pulseIntv=null;
      try{ if(navigator.vibrate)navigator.vibrate(200); }catch(e){}
      const beats=prompt('How many beats did you count in '+dur+' seconds?');
      ring.classList.remove('on'); if(count)count.textContent=''; if(hint)hint.textContent='tap 10s/30s & count beats';
      if(beats!=null){ const b=Math.max(0,Math.round(+beats)); if(b){ const bpm=Math.round(b*(60/dur)); const inp=document.getElementById('m-rhr'); if(inp)inp.value=bpm; if(typeof draft!=='undefined'&&draft)draft.rhr=bpm; if(hint)hint.textContent='✓ '+bpm+' bpm'; } }
    }
  },50);
}

<script>
/* brand.js (inlined for standalone) */
/* ============================================================
 * brand.js — the suite wordmark = the CURRENT USER'S name.
 *
 * Every page ships with the literal wordmark "Philipp" (titles, the
 * "← back" links, the live tickers, aria-labels). This swaps that
 * wordmark for the name saved in the onboarding profile
 * (patron_profile_v1), falling back to "Dashboard" until one is set.
 *
 * It runs on load AND re-applies after the page's own JS re-renders
 * (via a MutationObserver), so JS-built markup stays branded too.
 * If the user's name actually IS "Philipp", it's a no-op.
 *
 * Include once per page, anywhere after <body> opens (we add it last).
 * ============================================================ */
(function () {
  var WORDMARK = 'Philipp'; // the literal baked into every page's markup
  function brand() {
    try {
      var p = JSON.parse(localStorage.getItem('patron_profile_v1') || 'null');
      var n = (p && p.name) ? String(p.name).trim() : '';
      return n || 'Dashboard';
    } catch (e) { return 'Dashboard'; }
  }

  var mo = null;
  function patch() {
    var b = brand();
    if (b === WORDMARK) return; // already correct — nothing to do
    var re = new RegExp(WORDMARK, 'g');

    // 1) visible text nodes (skip script/style/inputs so we never touch code)
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode: function (node) {
        var p = node.parentNode;
        if (!p) return NodeFilter.FILTER_REJECT;
        var tag = p.nodeName;
        if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'TEXTAREA') return NodeFilter.FILTER_REJECT;
        return (node.nodeValue && node.nodeValue.indexOf(WORDMARK) >= 0)
          ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    var hits = [], n;
    while ((n = walker.nextNode())) hits.push(n);
    hits.forEach(function (t) { t.nodeValue = t.nodeValue.replace(re, b); });

    // 2) aria-labels that name the wordmark
    var labelled = document.querySelectorAll('[aria-label*="' + WORDMARK + '"]');
    for (var i = 0; i < labelled.length; i++) {
      labelled[i].setAttribute('aria-label', labelled[i].getAttribute('aria-label').replace(re, b));
    }

    // 3) the document title
    if (document.title.indexOf(WORDMARK) >= 0) document.title = document.title.replace(re, b);
  }

  // Patch with the observer paused so our own edits don't retrigger us.
  function run() {
    if (mo) mo.disconnect();
    try { patch(); } catch (e) {}
    if (mo && document.body) mo.observe(document.body, { childList: true, subtree: true, characterData: true });
  }

  function start() {
    mo = new MutationObserver(run);
    run();
  }
  if (document.readyState !== 'loading') start();
  else document.addEventListener('DOMContentLoaded', start);

  // Name changed in another tab / after sync → re-brand.
  window.addEventListener('storage', function (e) {
    if (e.key === 'patron_profile_v1' || e.key === null) run();
  });
})();
</script>
